<h1>Home Gig Login</h1>

<form (ngSubmit)="onSubmit()">
  <div>
    <label for="email">Email Address</label>
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
      required
    />
  </div>

  <div>
    <label for="password">Password</label>
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="password"
      required
    />
  </div>

  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <button type="submit">Login</button>
</form>

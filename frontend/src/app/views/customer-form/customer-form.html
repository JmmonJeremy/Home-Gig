<h1>{{ isEditMode ? 'Edit Customer' : 'Add Customer' }}</h1>

@if (errorMessage) {
  <p>{{ errorMessage }}</p>
}

<form (ngSubmit)="onSubmit()">
  <div>
    <label for="name">Customer Name</label>
    <input id="name" name="name" [(ngModel)]="customer.name" required />
  </div>

  <div>
    <label for="phone">Phone</label>
    <input id="phone" name="phone" [(ngModel)]="customer.phone" />
  </div>

  <div>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" [(ngModel)]="customer.email" />
  </div>

  <div>
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" [(ngModel)]="customer.notes"></textarea>
  </div>

  <button type="submit">{{ isEditMode ? 'Update Customer' : 'Create Customer' }}</button>
  <button type="button" (click)="cancel()">Cancel</button>
</form>

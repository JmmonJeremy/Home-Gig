<aside class="sidebar position-fixed top-0 start-0 bottom-0 bg-white m-2 border-end" style="--bs-border-width: 2px; --bs-border-color: #dee2e6;">
  <div class="sidebar-mobile-top d-md-none">
    <div class="dropdown sidebar-top-nav-dropdown">
      <button
        type="button"
        class="sidebar-menu-toggle dropdown-toggle"
        data-bs-toggle="dropdown"
        data-bs-display="static"
        aria-expanded="false"
        aria-label="Open navigation menu"
      >
        <i class="bi bi-list" aria-hidden="true"></i>
      </button>

      <ul class="dropdown-menu sidebar-mobile-dropdown-menu">
        <li><a class="dropdown-item" routerLink="/dashboard">Dashboard</a></li>
        <li><a class="dropdown-item" routerLink="/products">Products</a></li>
        <li><a class="dropdown-item" routerLink="/inventory">Inventory</a></li>
        <li><a class="dropdown-item" routerLink="/customers">Customers</a></li>
        <li><a class="dropdown-item" routerLink="/orders">Orders</a></li>
        <li><a class="dropdown-item" routerLink="/payments">Payments</a></li>
        <li><a class="dropdown-item" routerLink="/reports">Reports</a></li>
        <li><a class="dropdown-item" routerLink="/login" (click)="logout($event)">Logout</a></li>
      </ul>
    </div>

    <a class="sidebar-mobile-brand" routerLink="/dashboard" routerLinkActive="active-header">
      <span class="brand">Home Gig</span>
      <img
        src="/assets/images/home-gig-icon1.png"
        alt="Home"
        class="sidebar-home-icon"
      />
    </a>
  </div>

  <a class="sidebar-header d-none d-md-flex" routerLink="/dashboard" routerLinkActive="active-header">
    <span class="brand">Home Gig</span>

    <img
      src="/assets/images/home-gig-icon1.png"
      alt="Home"
      class="sidebar-home-icon"
    />
  </a>

  <nav class="sidebar-nav d-none d-md-flex">
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/products" routerLinkActive="active">Products</a>
    <a routerLink="/inventory" routerLinkActive="active">Inventory</a>
    <a routerLink="/customers" routerLinkActive="active">Customers</a>
    <a routerLink="/orders" routerLinkActive="active">Orders</a>
    <a routerLink="/payments" routerLinkActive="active">Payments</a>
    <a routerLink="/reports" routerLinkActive="active">Reports</a>
    <a routerLink="/login" (click)="logout($event)">Logout</a>
  </nav>

  <nav class="sidebar-nav-mobile d-md-none" aria-label="Mobile navigation">
    <a routerLink="/dashboard" routerLinkActive="active">
      <i class="bi bi-speedometer2 sidebar-nav-icon" aria-hidden="true"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/orders" routerLinkActive="active">
      <i class="bi bi-cart-fill sidebar-nav-icon" aria-hidden="true"></i>
      <span>Orders</span>
    </a>
    <a routerLink="/reports" routerLinkActive="active">
      <i class="bi bi-bar-chart-fill sidebar-nav-icon" aria-hidden="true"></i>
      <span>Reports</span>
    </a>
    <div class="dropdown dropup sidebar-bottom-nav-dropdown">
      <button
        type="button"
        class="sidebar-mobile-menu-btn dropdown-toggle"
        data-bs-toggle="dropdown"
        data-bs-display="static"
        aria-expanded="false"
        aria-label="Open more navigation options"
      >
        <i class="bi bi-list sidebar-nav-icon" aria-hidden="true"></i>
        <span>Menu</span>
      </button>

      <ul class="dropdown-menu dropdown-menu-end sidebar-mobile-dropdown-menu">
        <li><a class="dropdown-item" routerLink="/products">Products</a></li>
        <li><a class="dropdown-item" routerLink="/inventory">Inventory</a></li>
        <li><a class="dropdown-item" routerLink="/customers">Customers</a></li>
        <li><a class="dropdown-item" routerLink="/payments">Payments</a></li>
        <li><a class="dropdown-item" routerLink="/login" (click)="logout($event)">Logout</a></li>
      </ul>
    </div>
  </nav>
</aside>

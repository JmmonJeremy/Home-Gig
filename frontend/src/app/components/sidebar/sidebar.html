<aside class="sidebar position-fixed top-0 start-0 bottom-0 bg-white m-2 border-end" style="--bs-border-width: 2px; --bs-border-color: #dee2e6;">
  <button
    class="mobile-menu-button"
    type="button"
    aria-label="Open navigation menu"
    [attr.aria-expanded]="isTopMobileMenuOpen"
    (click)="toggleTopMobileMenu()"
  >
    <i class="bi bi-list" aria-hidden="true"></i>
  </button>

  <a class="sidebar-header" routerLink="/dashboard" routerLinkActive="active-header">
    <span class="brand">Home Gig</span>
   
      <img
        src="/assets/images/home-gig-icon1.png"
        alt="Home"
        class="sidebar-home-icon"
      />    
  </a>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-speedometer2 sidebar-nav-icon" aria-hidden="true"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/products" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-box-seam sidebar-nav-icon" aria-hidden="true"></i>
      <span>Products</span>
    </a>
    <a routerLink="/inventory" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-clipboard-data sidebar-nav-icon" aria-hidden="true"></i>
      <span>Inventory</span>
    </a>
    <a routerLink="/customers" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-people sidebar-nav-icon" aria-hidden="true"></i>
      <span>Customers</span>
    </a>
    <a routerLink="/orders" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-cart-fill sidebar-nav-icon" aria-hidden="true"></i>
      <span>Orders</span>
    </a>
    <a routerLink="/payments" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-credit-card sidebar-nav-icon" aria-hidden="true"></i>
      <span>Payments</span>
    </a>
    <a routerLink="/reports" routerLinkActive="active" (click)="closeMobileMenus()">
      <i class="bi bi-graph-up-arrow sidebar-nav-icon" aria-hidden="true"></i>
      <span>Reports</span>
    </a>
    <a routerLink="/login" (click)="logout($event)">
      <i class="bi bi-box-arrow-right sidebar-nav-icon" aria-hidden="true"></i>
      <span>Logout</span>
    </a>
  </nav>

  <button
    class="mobile-footer-menu-button"
    type="button"
    aria-label="Open navigation menu"
    [attr.aria-expanded]="isFooterMobileMenuOpen"
    (click)="toggleFooterMobileMenu()"
  >
    <i class="bi bi-list sidebar-nav-icon" aria-hidden="true"></i>
    <span>Menu</span>
  </button>

  @if (isTopMobileMenuOpen) {
    <div class="mobile-menu-panel mobile-menu-panel-top">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileMenus()">Dashboard</a>
      <a routerLink="/products" routerLinkActive="active" (click)="closeMobileMenus()">Products</a>
      <a routerLink="/inventory" routerLinkActive="active" (click)="closeMobileMenus()">Inventory</a>
      <a routerLink="/customers" routerLinkActive="active" (click)="closeMobileMenus()">Customers</a>
      <a routerLink="/orders" routerLinkActive="active" (click)="closeMobileMenus()">Orders</a>
      <a routerLink="/payments" routerLinkActive="active" (click)="closeMobileMenus()">Payments</a>
      <a routerLink="/reports" routerLinkActive="active" (click)="closeMobileMenus()">Reports</a>
      <a routerLink="/login" (click)="logout($event)">Logout</a>
    </div>
  }

  @if (isFooterMobileMenuOpen) {
    <div class="mobile-menu-panel mobile-menu-panel-footer">
      <a routerLink="/products" routerLinkActive="active" (click)="closeMobileMenus()">Products</a>
      <a routerLink="/inventory" routerLinkActive="active" (click)="closeMobileMenus()">Inventory</a>
      <a routerLink="/customers" routerLinkActive="active" (click)="closeMobileMenus()">Customers</a>
      <a routerLink="/payments" routerLinkActive="active" (click)="closeMobileMenus()">Payments</a>
      <a routerLink="/login" (click)="logout($event)">Logout</a>
    </div>
  }
</aside>

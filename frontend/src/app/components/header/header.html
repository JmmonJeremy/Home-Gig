<header class="top-header position-fixed top-0 me-2">
  <div class="mobile-header-white-band d-md-none" aria-hidden="true"></div>
  <div class="mobile-header-white-underband d-md-none" aria-hidden="true"></div>

  <div class="profile-menu dropdown">
    <button
      class="profile-button dropdown-toggle"
      type="button"
      data-bs-toggle="dropdown"
      aria-expanded="false"
    >
      <img
        src="/assets/images/profile-icon.png"
        alt="Profile"
        class="profile-icon"
      />
      <span>Profile</span>
    </button>

    <ul class="dropdown-menu dropdown-menu-end" data-bs-auto-close="outside">
      <li><a class="dropdown-item" href="#" (click)="onProfileOption($event, 'Profile')">Profile</a></li>
      <li><a class="dropdown-item" href="#" (click)="onProfileOption($event, 'Settings')">Settings</a></li>
      <li><a class="dropdown-item" routerLink="/login" (click)="logout($event)">Logout</a></li>
    </ul>

    @if (infoMessage) {
      <div class="profile-info-message">
        {{ infoMessage }}
      </div>
    }
  </div>

  @if (isCustomerFormPage) {
    <a class="header-form-back-link d-none d-md-flex" routerLink="/customers">
      <i class="bi bi-arrow-left" aria-hidden="true"></i>
      <span>Customers List</span>
    </a>
  }

  <div class="header-search-section" [class.d-none]="isProductFormPage || isCustomerFormPage" [class.d-md-block]="isProductFormPage">
    <div class="search-box">
      <i class="bi bi-search search-icon"></i>
      <input
        #appSearchInput
        type="text"
        placeholder="Search"
        class="form-control"
        [class.has-clear]="searchText.length > 0"
        [ngModel]="searchText"
        (ngModelChange)="onSearchInput($event)"
        (focus)="onSearchFocus()"
      />

      @if (searchText.length > 0) {
        <button
          type="button"
          class="search-clear-btn"
          aria-label="Clear search"
          (click)="clearSearch($event)"
        >
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
      }

      @if (showSearchCategories && showsSearchCategoryDropdown()) {
        <div class="dropdown-menu show search-category-menu">
          <div class="dropdown-header">Go to page</div>
          @for (category of searchCategories; track category.path) {
            <button
              type="button"
              class="dropdown-item"
              (click)="selectSearchCategory(category.path)"
            >
              {{ category.label }}
            </button>
          }
        </div>
      }
    </div>
  </div>
</header>
